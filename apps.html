<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeForce Now</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        background: #0a0a0a;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
      .loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-size: 18px;
        text-align: center;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div class="loading" id="loading">
      Loading GeForce Now through proxy... (this can take 10-30 seconds)
    </div>

    <iframe
      id="proxyFrame"
      src="https://scramjet.mercurywork.shop/https%3A%2F%2Fwww.nvidia.com%2Fen-us%2Fgeforce-now%2F"
      frameborder="0"
      allowfullscreen
      allow="fullscreen; clipboard-write; encrypted-media"
    ></iframe>

    <script>
      // Hide loading text once iframe starts loading content
      const frame = document.getElementById("proxyFrame");
      const loading = document.getElementById("loading");

      frame.onload = () => {
        loading.style.display = "none";
      };

      // Fallback if it stays black too long
      setTimeout(() => {
        if (loading.style.display !== "none") {
          loading.innerHTML = `Still loading or black screen?<br>Try refreshing or use a different proxy.`;
        }
      }, 25000);
    </script>
  </body>
</html>
